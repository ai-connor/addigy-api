            Name is the name of the webhook.
            It is a required field used for identifying the webhook.
          type: string
        organization_id:
          type: string
        secret_token:
          description: |-
            SecretToken is a secret token associated with the webhook for authentication and security.
            It is used to verify the authenticity of the webhook requests.
          type: string
        trigger:
          allOf:
          - $ref: "#/components/schemas/webhooks_service.WebhookTrigger"
