  /mdm/configurations/profile:
    post:
      description: |-
        Creates an MDM profile.<br>
        <b>Permission Required: </b>Create MDM Profiles.<br>
        <b>Requirements: </b> The payload must be a valid MDM payload. We do not support profiles with multiple payloads at this time. Use payload_display_name, payload_type, payload_priority, and the required payload keys as outlined in the Apple Documentation for the payload that you are trying to create. <br>
        <b>Payload: </b> This is what each field represents within the payload and which are the allowed values for the request.<br>
        payload_display_name - represents the name of the payload to be created, must be 1–160 characters and may include letters, numbers, spaces, hyphens, underscores, apostrophes, and parentheses.
        payload_type - represents the type of payload as defined in the Apple Documentation, such as com.apple.airplay, must not be empty.
        payload_priority - represents the priority order in which the profile will be sent to the device, once the policy runs, default value is 9 (Facts: 2, Self Service: 2, Splashtop: 5, MS Office Update: 10, Software: 10, OS Users: 10, System Update: 20).<br>
        <b>NOTE: </b>Key names are in snake-case naming convention, not Apple naming convention. For example, it's allow_passcode_modification instead of allowPasscodeModification.<br>
        For more information about Addigy's API Supported MDM payloads, please visit [Addigy's API Supported MDM Payloads](https://support.addigy.com/hc/en-us/articles/29982135947411)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_mdm_configurations_profile_post_request"
        description: Request to create an MDM profile
        required: true
      responses:
        "200":
          content:
            application/json:
