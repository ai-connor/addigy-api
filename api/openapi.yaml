openapi: 3.0.1
info:
  contact: {}
  description: |-
    The [Addigy API](https://app.addigy.com/integrations) is designed to provide Addigy users with programmatic access to all data in their Addigy environment. Via the Addigy API users have read and write access to nearly all the data in their environment allowing them to automate activities in Addigy and integrate into 3rd party systems.<br>
    API keys can be created within your Addigy organization by visiting [Account -> Integrations](https://app.addigy.com/integrations).<br>
    **What does it mean if an API v2 endpoint is marked as "Beta"?** In rare cases, the required request and response data for an endpoint may change. Should a change be needed, Addigy will communicate the changes providing time for users to transition and test.<br>
    **Child Organizations** <br>Endpoints that have /oa/ in their path enable you to request data for an organization and its descendant organizations. To use this capability, there are two query parameters:
    <ul><li><b>multitenancy</b> (optional, boolean): When set to true, the request will include data for all descendant organizations (child, grandchild, etc.), allowing you to query across multiple organizations. If set to false or omitted, the request will return data only for your own organization.</li>
    <br><li><b>child-organizations</b> (optional, string): A comma-separated list of organization IDs to filter results for specific descendant organizations. If omitted, all child organizations will be included in the query by default if the multitenancy query param is set to true.</li></ul>
    <p>If you have questions or suggestions for the Addigy API Contact <a href="mailto:support@addigy.com">Addigy Support</a></p>
  title: Addigy API Documentation
  version: "2.0"
