        webhook_id: webhook_id
        organization_id: organization_id
        error_counter: 0
        last_error: last_error
        run_after: run_after
        last_execute: last_execute
        status: status
      properties:
        error_counter:
          description: |-
            ErrorCounter is the number of errors the webhook has encountered.

            This count helps track how often the webhook experiences issues.
          type: integer
        last_error:
          description: |-
            LastError describes the last error encountered by the webhook.

            It provides details about the most recent error, if any, experienced by the webhook.
          type: string
        last_execute:
          description: |-
            LastExecute is the timestamp when the webhook last executed a task.

            It indicates the last time the webhook sent an event.
          type: string
        last_process:
          description: |-
            LastProcess is the timestamp when the webhook last processed an event.

            It provides information about when the webhook was last active in processing events.
          type: string
        last_schedule:
          description: |-
            LastSchedule is the timestamp when the webhook was last scheduled.

            It indicates the last time an event was enqueued.
          type: string
        organization_id:
          type: string
        run_after:
          description: |-
            RunAfter is the next scheduled time the webhook will execute.

            This value is used to manage the scheduling of webhook events.
          type: string
        status:
          description: |-
            Status indicates the current status of the webhook.

            Possible values:
            - "active": The webhook is currently active and running as expected.
            - "inactive": The webhook is inactive and not processing events.
          type: string
        webhook_id:
          type: string
      type: object
