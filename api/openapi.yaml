    post:
      description: |-
        Returns an array of DDM status items for devices in the organization.

        **Filtering options:**
        - `udids` — limit results to specific device UDIDs. Omit to return all devices in the org.
        - `includeUserChannel` — when `false` (default) only device-channel entries are returned (`user_id` is empty). Set to `true` to include user-channel entries as well.
        - `statuses` — list of status field names to include in the response. Omit or pass an empty array to return all fields. Unknown values are silently ignored.

        **Valid `statuses` values:**
        `device`, `diskManagement`, `management`, `mdm`, `passcode`, `security`, `services`, `softwareUpdate`, `package`, `enhancedLogging`, `contentCache`, `app`, `migrationAssistant`, `screenSharing`, `error`

        The response always includes `org_id` and `udid` regardless of the `statuses` filter.
