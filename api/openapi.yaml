  /mdm/configurations/profiles/payloads:
    put:
      description: |-
        Updates an MDM profile's payloads.<br>
        <b>Permission Required: </b>Edit MDM Profiles.<br>
        <b>IMPORTANT: </b>This update method works as a REPLACE operation. Partial data is not supported. The existing payload will be removed and a new payload will be created containing only the new data provided. You must provide the complete payload structure in the request.<br>
        <b>Key Values: </b>Some key values need to be exactly the same as the existing payload (e.g., payload_identifier, payload_group_id, payload_uuid) to identify which payload to replace.<br>
        <b>Requirements: </b> The payload must be a valid MDM payload. Use payload_display_name, payload_type, payload_priority, and the required payload keys as outlined in the Apple Documentation for the payload that you are trying to update. <br>
        <b>Custom Profiles: </b>This is a special case: data in field `custom_profile_content` needs to be modified and encoded in the request data so that changes take place. This field contains a base64 encoded profile that will be deployed. Therefore, it needs to be modified and provided as a base64 string. For everything else, use the regular MDM payload data.<br>
      requestBody:
        content:
          application/json:
