      security:
      - ApiKeyAuth: []
      summary: Gets the different sources available to be exported.
      tags:
      - Exports
  /oa/exports/sources/{source_id}/download:
    get:
      description: |-
        Exports the data of a source. These data sources often contain a snapshot of the data for every day specified in the `date_start` and `date_end` query parameters. Keep in mind that the data could change or stay the same from one day to the next.
        This endpoint is not paginated by design. It could take a few seconds to be completed and return a large amount of data. For best results, use the `date_start` and `date_end` query parameters to limit the amount of time and data.
        <b>Permission Required: </b>Export Report Data.
      parameters:
      - description: The ID of the source to get the data from. You can find the ID
          in the response of the `/oa/exports/sources` endpoint.
        in: path
        name: source_id
        required: true
        schema:
          type: string
      - description: "First date to get data from. Must be formatted as YYYY-MM-DD,\
          \ for example 2024-12-01 for December 1st, 2024."
        in: query
        name: date_start
        required: true
        schema:
          type: string
      - description: "Last date to get data from. Must be formatted as YYYY-MM-DD,\
          \ for example 2024-12-01 for December 1st, 2024."
        in: query
        name: date_end
        required: true
        schema:
          type: string
      - description: A list of policy ids to filter the data by. Must be formatted
          as a comma separated list.
        explode: false
        in: query
        name: policy_ids
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: The data of the source in JSON format.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response_entities.ErrorResponse"
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response_entities.ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Exports the data of a source.
      tags:
      - Exports
