  /mdm/commands/erase-device:
    post:
      description: |-
        This command erases the specified MDM device.<br>
        <b>Permission Required: </b>Execute Commands.<br>
        <b>Information: </b>The MDM Erase Device command works on macOS, iOS, iPadOS, and tvOS. This command does not require supervision.<br>
        <b>General Requirements: </b>The Device UUID is required for all os's<br>
        <b>macOS Requirements: </b><br>
        Pin - The six-character PIN for Find My. This value is available in macOS 10.8 and later. <b>This is a required field for devices that don't support EACS (computers without Apple M1 chip or the Apple T2 Security Chip)</b><br>
        ObliterationBehavior - This key defines the fallback behavior for erasing a device. In macOS 12 and later, this command uses Erase All Content and Settings (EACS) on Mac computers with the Apple M1 chip or the Apple T2 Security Chip. On those devices, if EACS can’t run, the device can use obliteration (macOS 11.x behavior). This key has no effect on machines prior to the T2 chip. Upon receiving this command, the device performs preflight checks to determine if the device is in a state that allows EACS.<br>
        The following values for obliteration_behavior define the device’s fallback behavior:<br>
        DoNotObliterate - If EACS preflight fails, the device responds to the server with an Error status and doesn’t attempt to erase itself. If EACS preflight succeeds but EACS fails, then the device doesn’t attempt to erase itself.<br>
        ObliterateWithWarning - If EACS preflight fails, the device responds with an Acknowledged status and then attempts to erase itself. If EACS preflight succeeds but EACS fails, then the device attempts to erase itself.<br>
        Always - The system doesn’t attempt EACS. T2 and later devices always obliterate.<br>
        Default - If EACS preflight fails, the device responds to the server with an Error status and then attempts to erase itself. If EACS preflight succeeds but EACS fails, then the device attempts to erase itself.<br>
        <b>iOS and iPadOS Requirements: </b><br>
        DisallowProximitySetup - If true, disable Proximity Setup on the next reboot and skip the pane in Setup Assistant. This value is available in iOS 11 and later. Prior to iOS 14, don’t use this option with any other option.<br>
        PreserveDataPlan - If true, preserve the data plan on an iPhone or iPad with eSIM functionality, if one exists. This value is available in iOS 11 and later.<br>
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/mdm_service_devices.EraseDeviceRequest"
        description: Erase Device Request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_mdm_commands_erase_device_post_200_response"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response_entities.ErrorResponse"
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/response_entities.ErrorResponse"
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Erases an MDM device
      tags:
      - mdm commands
      x-codegen-request-body-name: request
